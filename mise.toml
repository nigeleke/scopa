[tools]
gleam = "1.16"
erlang = "29"
elixir = "1.19"
rebar = "3.27"

[tasks.build]
description = "Build all workspace projects in dependency order"
run = """
echo "[build] Build all projects in dependency order"
cd build_pipeline
gleam build
gleam run
cd ../scopa
gleam build
cd ..
"""

[tasks.test]
description = "Run tests (and dev entrypoints) across all workspace projects"
run = """
echo "[test] Run tests across all projects"
cd build_pipeline
gleam test
gleam run
cd ../scopa
gleam test
cd ..
"""

[tasks.run]
description = "Execute the build_pipeline entrypoint and rebuild dependent projects"
run = """
echo "[run] Execute build_pipeline and rebuild dependent projects"
cd build_pipeline
gleam run
cd ../scopa
gleam run -m lustre/dev start
cd ..
"""

[tasks.default]
description = "Default task: runs the main pipeline execution"
depends = ["run"]

[tasks.clean]
description = "Clean build artifacts across all workspace projects"
run = """
echo "[clean] Clean all workspace projects"
cd build_pipeline
gleam clean
cd ../scopa
gleam clean
cd ..
"""

[tasks.update]
description = "Update Gleam dependencies across all workspace projects"
run = """
echo "[update] Update dependencies across all workspace projects"
cd build_pipeline
gleam update
cd ../scopa
gleam update
cd ..
"""

[tasks.format]
description = "Format Gleam source across all workspace projects"
run = """
echo "[update] Format Gleam source across all workspace projects"
cd build_pipeline
gleam format
cd ../scopa
gleam format
cd ..
"""
